services:
  postgres:
    image: postgres:17-alpine
    container_name: ifnotus-postgres
    environment:
      POSTGRES_USER: ifnotus
      POSTGRES_PASSWORD: ifnotus
      POSTGRES_DB: ifnotus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ifnotus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ifnotus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ifnotus-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ifnotus:ifnotus@postgres:5432/ifnotus
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ifnotus-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ifnotus:ifnotus@postgres:5432/ifnotus
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m app.workers.cli

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ifnotus-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    command: npm run dev -- --host

volumes:
  postgres_data:
  redis_data:
